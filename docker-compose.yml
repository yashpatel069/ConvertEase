version: '3.8'

services:
  database:
    image: mongo:latest
    container_name: convertease-db
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - convertease-network

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: convertease-server
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://database:27017/convertease
      - JWT_SECRET=production_access_token_secret_key_9823471092384
      - JWT_REFRESH_SECRET=production_refresh_token_secret_key_1928371239
      - STORAGE_PROVIDER=local
      - CLIENT_URL=http://localhost:5173
    depends_on:
      - database
    volumes:
      - server-uploads:/app/uploads
      - server-stored:/app/stored_files
    networks:
      - convertease-network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: convertease-client
    ports:
      - "5173:5173"
    depends_on:
      - server
    networks:
      - convertease-network

volumes:
  mongo-data:
  server-uploads:
  server-stored:

networks:
  convertease-network:
    driver: bridge
